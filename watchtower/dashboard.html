<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UV Suite Watchtower</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0b0d;
    --surface: #16161a;
    --surface-hover: #1d1d22;
    --border: #26262c;
    --border-subtle: #1a1a1e;
    --text: #e9e9ec;
    --text-muted: #9a9aa3;
    --text-dim: #6a6a73;
    --accent: #0a84ff;
    --accent-contrast: #ffffff;
    --success: #30d158;
    --success-soft: rgba(48, 209, 88, 0.18);
    --danger: #ff453a;
    --danger-soft: #ff375f;
    --warning: #ff9f0a;
    --yellow: #ffd60a;
    --info: #64d2ff;
    --purple: #bf5af2;
    --purple-soft: #ac8ee0;
    --peach: #ff6961;

    --event-latest-bg: #17171c;
    --needs-human-bg: rgba(255, 55, 95, 0.14);
    --failure-bg: rgba(255, 105, 97, 0.12);
    --session-boundary-bg: rgba(48, 209, 88, 0.06);
    --user-prompt-bg: rgba(255, 214, 10, 0.06);
    --user-prompt-text: #ffd60a;

    --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Text', system-ui, sans-serif;
    --font-mono: 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
  }

  [data-theme="light"] {
    color-scheme: light;
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-hover: #f4f4f5;
    --border: #e4e4e7;
    --border-subtle: #ededef;
    --text: #18181b;
    --text-muted: #52525b;
    --text-dim: #8a8a93;
    --accent: #0066cc;
    --accent-contrast: #ffffff;
    --success: #1a9e3e;
    --success-soft: rgba(26, 158, 62, 0.15);
    --danger: #d8302a;
    --danger-soft: #dc184a;
    --warning: #c07300;
    --yellow: #a5720d;
    --info: #0b8aa4;
    --purple: #7c2fbc;
    --purple-soft: #8b3fd4;
    --peach: #c13a35;

    --event-latest-bg: #f4f4f5;
    --needs-human-bg: rgba(220, 24, 74, 0.08);
    --failure-bg: rgba(216, 48, 42, 0.07);
    --session-boundary-bg: rgba(26, 158, 62, 0.06);
    --user-prompt-bg: rgba(165, 114, 13, 0.06);
    --user-prompt-text: #8a5f0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    flex-direction: column;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  .header .meta { display: flex; align-items: center; gap: 14px; }
  .header .status { font-size: 13px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; vertical-align: 1px; }
  .header .status .dot.on { background: var(--success); box-shadow: 0 0 0 3px var(--success-soft); }
  .header .status .dot.off { background: var(--danger); }

  .theme-toggle {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 7px;
    width: 34px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: color 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--text-dim); background: var(--surface); }
  .theme-toggle svg { width: 15px; height: 15px; }
  .theme-toggle .icon-sun { display: block; }
  .theme-toggle .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: block; }

  .stats {
    padding: 16px 28px;
    display: flex;
    gap: 36px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .stat { display: flex; flex-direction: column; }
  .stat .n {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .stat .l {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
    margin-top: 4px;
  }
  .stat .n.alert { color: var(--danger-soft); }

  .sessions {
    padding: 12px 28px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .session-tag {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s ease;
  }
  .session-tag:hover { border-color: var(--text-dim); }
  .session-tag.active { border-color: var(--text); }

  .filters {
    padding: 10px 28px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters select, .filters button {
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    height: 32px;
    transition: color 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
  }
  .filters select:hover, .filters button:hover { border-color: var(--text-dim); color: var(--text); }
  .filters select:focus { outline: none; border-color: var(--accent); }
  .filters button.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }

  .timeline { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 0; }

  .event {
    padding: 14px 28px;
    display: grid;
    grid-template-columns: 82px 150px 170px 90px 1fr;
    gap: 14px;
    align-items: start;
    font-size: 14px;
    border-bottom: 1px solid var(--border-subtle);
    transition: background-color 0.15s ease, opacity 0.15s ease;
    opacity: 0.82;
  }
  .event:hover { background: var(--surface-hover); opacity: 1; }
  .event .time {
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding-top: 2px;
  }
  .event .type {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.01em;
  }
  .event .session {
    font-size: 12.5px;
    font-weight: 500;
    border-radius: 10px;
    padding: 3px 10px;
    display: inline-block;
    max-width: 170px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .event .tool {
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding-top: 2px;
  }
  .event .detail {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }
  .event .detail .filepath { color: var(--info); }
  .event .detail .cmd { color: var(--yellow); font-family: var(--font-mono); }

  .event.latest {
    opacity: 1;
    background: var(--event-latest-bg);
    border-bottom: 2px solid var(--border);
  }
  .event.latest .type { font-size: 15px; }
  .event.latest .detail { font-size: 15px; color: var(--text); }

  .event.needs-human {
    background: var(--needs-human-bg);
    border-left: 4px solid var(--danger-soft);
    padding-left: 24px;
    opacity: 1;
  }
  .event.needs-human .type { color: var(--danger-soft); }
  .event.needs-human .human-badge {
    display: inline-block;
    background: var(--danger-soft);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    margin-left: 10px;
    vertical-align: middle;
  }

  .event.failure {
    background: var(--failure-bg);
    border-left: 4px solid var(--peach);
    padding-left: 24px;
    opacity: 1;
  }
  .event.session-boundary { background: var(--session-boundary-bg); }
  .event.user-prompt { background: var(--user-prompt-bg); }
  .event.user-prompt .detail { color: var(--user-prompt-text); font-style: italic; }

  .timeline-end { padding: 20px 24px; text-align: center; border-bottom: 1px solid var(--border-subtle); }
  .loader { display: inline-block; width: 48px; height: 4px; position: relative; }
  .loader::before {
    content: '';
    position: absolute;
    width: 10px;
    height: 4px;
    background: var(--text-dim);
    border-radius: 2px;
    animation: loader 1.4s ease-in-out infinite;
  }
  @keyframes loader {
    0%, 100% { left: 0; }
    50% { left: 38px; }
  }
  .timeline-end .waiting {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 10px;
    font-variant-numeric: tabular-nums;
  }

  .empty { padding: 72px 28px; text-align: center; color: var(--text-dim); }
  .empty p { margin-top: 10px; font-size: 14px; }
  .empty p strong { color: var(--text-muted); font-weight: 600; font-size: 15px; }

  .timeline::-webkit-scrollbar { width: 10px; }
  .timeline::-webkit-scrollbar-track { background: transparent; }
  .timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  .timeline::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .type-SessionStart { color: var(--success); }
  .type-SessionEnd, .type-Stop { color: var(--danger); }
  .type-PreToolUse { color: var(--accent); }
  .type-PostToolUse { color: var(--info); }
  .type-PostToolUseFailure { color: var(--peach); }
  .type-UserPromptSubmit { color: var(--yellow); }
  .type-SubagentStart { color: var(--purple); }
  .type-SubagentStop { color: var(--purple-soft); }
  .type-Notification { color: var(--warning); }
  .type-PermissionRequest { color: var(--danger-soft); }
  .type-PreCompact { color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <h1>UV Suite Watchtower</h1>
  <div class="meta">
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Connecting...</span></div>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="n" id="sessionCount">0</div><div class="l">Sessions</div></div>
  <div class="stat"><div class="n" id="eventCount">0</div><div class="l">Events</div></div>
  <div class="stat"><div class="n" id="toolCount">0</div><div class="l">Tool calls</div></div>
  <div class="stat"><div class="n" id="errorCount">0</div><div class="l">Errors</div></div>
  <div class="stat"><div class="n" id="humanCount">0</div><div class="l">Need human</div></div>
</div>

<div class="sessions" id="sessionBar"></div>

<div class="filters">
  <select id="filterType"><option value="">All events</option></select>
  <select id="filterSession"><option value="">All sessions</option></select>
  <button id="btnHumanOnly" onclick="toggleHumanOnly()">Human needed</button>
  <button id="btnClear" onclick="clearEvents()">Clear</button>
</div>

<!-- Loader at top — latest events appear here -->
<div class="timeline-end" id="timelineEnd">
  <div class="loader"></div>
  <div class="waiting" id="waitingText">Listening for events...</div>
</div>

<div class="timeline" id="timeline">
  <div class="empty" id="emptyState">
    <p><strong>Waiting for events</strong></p>
    <p>Start a Claude Code session with UV Suite hooks.<br>Events will appear here in real-time.</p>
  </div>
</div>


<script>
const timeline = document.getElementById('timeline');
const emptyState = document.getElementById('emptyState');
const filterType = document.getElementById('filterType');
const filterSession = document.getElementById('filterSession');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const sessionBar = document.getElementById('sessionBar');
const waitingText = document.getElementById('waitingText');

let events = [];
let sessions = {};
let autoScroll = true;
let humanOnly = false;
let selectedSession = '';
let selectedType = '';
let lastEventDiv = null;

// Session colors and naming
const palette = ['#0a84ff','#30d158','#ff9f0a','#bf5af2','#ff375f','#64d2ff','#ffd60a','#ac8ee0','#ff6961','#5e5ce6'];
let colorIdx = 0;
function sessionColor(id) {
  if (!sessions[id]) {
    sessions[id] = { color: palette[colorIdx++ % palette.length], count: 0, lastEvent: null, label: null, app: null };
    updateSessionBar();
    updateFilterSession();
  }
  sessions[id].count++;
  sessions[id].lastEvent = Date.now();
  return sessions[id].color;
}

function updateSessionLabel(sid, ev) {
  if (!sessions[sid]) return;
  if (!sessions[sid].app && ev.source_app) {
    sessions[sid].app = ev.source_app;
  }
  // Use first UserPromptSubmit as session label
  const type = ev.event_type || ev.hook_event_name || '';
  if (!sessions[sid].label && type === 'UserPromptSubmit') {
    const prompt = ev.tool_input?.prompt || ev.tool_input?.content || ev.message || '';
    if (prompt.length > 0) {
      let label = prompt.slice(0, 45).replace(/\s+\S*$/, '');
      if (prompt.length > label.length) label += '...';
      sessions[sid].label = label;
      updateSessionBar();
      updateFilterSession();
    }
  }
}

function sessionDisplayName(id) {
  const s = sessions[id];
  if (!s) return shortId(id);
  if (s.label) {
    return s.app ? s.app + ': ' + s.label : s.label;
  }
  if (s.app) return s.app;
  return shortId(id);
}

function shortId(id) {
  if (!id) return '—';
  return id.length > 10 ? id.slice(0, 8) + '..' : id;
}

function shortSession(id) {
  return sessionDisplayName(id);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function timeSince(ts) {
  const secs = Math.floor((Date.now() - ts) / 1000);
  if (secs < 5) return 'just now';
  if (secs < 60) return secs + 's ago';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
  return Math.floor(secs / 3600) + 'h ago';
}

// Detect human intervention needed
function needsHuman(ev) {
  const type = ev.event_type || ev.hook_event_name || '';
  if (type === 'PermissionRequest') return true;
  if (type === 'Notification' && ev.notification_type === 'permission_prompt') return true;
  if (type === 'PostToolUseFailure') return true;
  if (ev.message && /stuck|blocked|escalat|need.*help|can.?t.*find/i.test(ev.message)) return true;
  return false;
}

function isFailure(ev) {
  const type = ev.event_type || ev.hook_event_name || '';
  return type.includes('Failure');
}

function isSessionBoundary(ev) {
  const type = ev.event_type || ev.hook_event_name || '';
  return type === 'SessionStart' || type === 'SessionEnd' || type === 'Stop';
}

function isUserPrompt(ev) {
  const type = ev.event_type || ev.hook_event_name || '';
  return type === 'UserPromptSubmit';
}

// Rich detail
function eventDetail(ev) {
  const parts = [];
  const tool = ev.tool_name || '';
  const input = ev.tool_input || {};

  if (tool === 'Read' && input.file_path) {
    parts.push(`<span class="filepath">${input.file_path}</span>`);
    if (input.offset) parts.push(`offset:${input.offset}`);
    if (input.limit) parts.push(`limit:${input.limit}`);
  } else if (tool === 'Write' && input.file_path) {
    parts.push(`<span class="filepath">${input.file_path}</span>`);
    if (input.content) parts.push(`(${input.content.length} chars)`);
  } else if (tool === 'Edit' && input.file_path) {
    parts.push(`<span class="filepath">${input.file_path}</span>`);
    if (input.old_string) parts.push(`"${input.old_string.slice(0, 40)}..."`);
  } else if (tool === 'Bash' && input.command) {
    parts.push(`<span class="cmd">$ ${input.command.slice(0, 100)}</span>`);
  } else if (tool === 'Grep' && input.pattern) {
    parts.push(`pattern: "${input.pattern}"`);
    if (input.path) parts.push(`in <span class="filepath">${input.path}</span>`);
  } else if (tool === 'Glob' && input.pattern) {
    parts.push(`<span class="filepath">${input.pattern}</span>`);
  } else if (tool === 'Agent') {
    parts.push(input.description || input.prompt?.slice(0, 80) || 'subagent');
  } else if (tool === 'WebSearch' && input.query) {
    parts.push(`"${input.query.slice(0, 80)}"`);
  } else if (tool === 'WebFetch' && input.url) {
    parts.push(`<span class="filepath">${input.url.slice(0, 80)}</span>`);
  } else if (isUserPrompt(ev)) {
    const prompt = input.prompt || input.content || ev.message || '';
    parts.push(prompt.slice(0, 120));
  } else if (ev.message) {
    parts.push(ev.message.slice(0, 100));
  } else if (input.file_path) {
    parts.push(`<span class="filepath">${input.file_path}</span>`);
  } else if (input.command) {
    parts.push(`<span class="cmd">$ ${input.command.slice(0, 80)}</span>`);
  } else if (ev.source_app) {
    parts.push(ev.source_app);
  }

  return parts.join(' ');
}

function renderEvent(ev) {
  const sid = ev.session_id || ev.source_app || 'unknown';
  const color = sessionColor(sid);
  const type = ev.event_type || ev.hook_event_name || '?';
  const tool = ev.tool_name || '';
  const human = needsHuman(ev);
  const fail = isFailure(ev);
  const boundary = isSessionBoundary(ev);
  const prompt = isUserPrompt(ev);

  const div = document.createElement('div');
  let cls = 'event';
  if (human) cls += ' needs-human';
  else if (fail) cls += ' failure';
  else if (prompt) cls += ' user-prompt';
  else if (boundary) cls += ' session-boundary';
  div.className = cls;

  const humanBadge = human ? '<span class="human-badge">NEEDS HUMAN</span>' : '';

  div.innerHTML = `
    <span class="time">${formatTime(ev._ts)}</span>
    <span class="type type-${type}">${type}${humanBadge}</span>
    <span class="session" style="background:${color}22;color:${color}" title="${sessionDisplayName(sid)}">${shortSession(sid)}</span>
    <span class="tool">${tool}</span>
    <span class="detail">${eventDetail(ev)}</span>
  `;

  div._ev = ev;

  // Check filters
  const typeMatch = !selectedType || type === selectedType;
  const sessMatch = !selectedSession || sid === selectedSession;
  const humanMatch = !humanOnly || human;
  if (!typeMatch || !sessMatch || !humanMatch) div.style.display = 'none';

  return div;
}

function addEvent(ev) {
  events.push(ev);
  if (emptyState.parentNode) emptyState.remove();
  const sid = ev.session_id || ev.source_app || 'unknown';
  updateSessionLabel(sid, ev);

  // Remove "latest" class from previous latest
  if (lastEventDiv) lastEventDiv.classList.remove('latest');

  const div = renderEvent(ev);
  div.classList.add('latest');
  lastEventDiv = div;

  // Prepend — newest at top
  timeline.prepend(div);

  updateStats();
  updateFilterType(ev);
  updateWaitingText(ev);

  // Scroll to top to show latest
  if (autoScroll) {
    timeline.scrollTop = 0;
  }
}

function updateWaitingText(ev) {
  if (ev) {
    const sid = ev.session_id || ev.source_app || 'unknown';
    waitingText.textContent = `Last: ${sessionDisplayName(sid)} — ${timeSince(ev._ts)}`;
  }
}

// Keep "time since" updated
setInterval(() => {
  if (events.length > 0) updateWaitingText(events[events.length - 1]);
}, 5000);

function updateStats() {
  document.getElementById('sessionCount').textContent = Object.keys(sessions).length;
  document.getElementById('eventCount').textContent = events.length;
  document.getElementById('toolCount').textContent = events.filter(e => (e.event_type || e.hook_event_name || '').includes('ToolUse')).length;
  const errors = events.filter(e => (e.event_type || e.hook_event_name || '').includes('Failure')).length;
  document.getElementById('errorCount').textContent = errors;
  document.getElementById('errorCount').className = 'n' + (errors > 0 ? ' alert' : '');
  // Count sessions whose most recent event is waiting on a human — so the
  // number drops back down once the session continues past the prompt.
  const latestBySession = {};
  for (const ev of events) {
    const sid = ev.session_id || ev.source_app || 'unknown';
    latestBySession[sid] = ev;
  }
  const humans = Object.values(latestBySession).filter(needsHuman).length;
  document.getElementById('humanCount').textContent = humans;
  document.getElementById('humanCount').className = 'n' + (humans > 0 ? ' alert' : '');
}

function updateSessionBar() {
  sessionBar.innerHTML = '';
  for (const [id, s] of Object.entries(sessions)) {
    const tag = document.createElement('span');
    tag.className = 'session-tag' + (selectedSession === id ? ' active' : '');
    tag.style.background = s.color + '22';
    tag.style.color = s.color;
    tag.textContent = sessionDisplayName(id) + ' (' + s.count + ')';
    tag.title = id;
    tag.onclick = () => { selectedSession = selectedSession === id ? '' : id; refilter(); updateSessionBar(); };
    sessionBar.appendChild(tag);
  }
}

const knownTypes = new Set();
function updateFilterType(ev) {
  const t = ev.event_type || ev.hook_event_name;
  if (t && !knownTypes.has(t)) {
    knownTypes.add(t);
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    filterType.appendChild(opt);
  }
}

function updateFilterSession() {
  filterSession.innerHTML = '<option value="">All sessions</option>';
  for (const id of Object.keys(sessions)) {
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = sessionDisplayName(id);
    filterSession.appendChild(opt);
  }
}

function refilter() {
  selectedType = filterType.value;
  selectedSession = filterSession.value;
  const rows = timeline.querySelectorAll('.event');
  rows.forEach((row) => {
    const ev = row._ev;
    if (!ev) return;
    const sid = ev.session_id || ev.source_app || 'unknown';
    const type = ev.event_type || ev.hook_event_name || '';
    const show = (!selectedType || type === selectedType)
              && (!selectedSession || sid === selectedSession)
              && (!humanOnly || needsHuman(ev));
    row.style.display = show ? '' : 'none';
  });
}

filterType.onchange = refilter;
filterSession.onchange = refilter;

function clearEvents() { events = []; sessions = {}; colorIdx = 0; timeline.innerHTML = ''; lastEventDiv = null; updateStats(); sessionBar.innerHTML = ''; }
function toggleAutoScroll() {
  autoScroll = !autoScroll;
  document.getElementById('btnAutoScroll').classList.toggle('active', autoScroll);
}
function toggleHumanOnly() {
  humanOnly = !humanOnly;
  document.getElementById('btnHumanOnly').classList.toggle('active', humanOnly);
  refilter();
}

// Server-Sent Events
function connect() {
  const source = new EventSource('/stream');

  source.onopen = () => {
    statusDot.className = 'dot on';
    statusText.textContent = 'Connected';
  };

  source.onerror = () => {
    statusDot.className = 'dot off';
    statusText.textContent = 'Reconnecting...';
  };

  source.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data.type === 'init' && data.events) {
        data.events.forEach(addEvent);
      } else {
        addEvent(data);
      }
    } catch (e) {}
  };
}

// Theme: persist choice in localStorage, fall back to system preference
const THEME_KEY = 'uv-watchtower-theme';
const themeToggle = document.getElementById('themeToggle');
const mql = window.matchMedia('(prefers-color-scheme: light)');

function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
function resolvedTheme() {
  return localStorage.getItem(THEME_KEY) || (mql.matches ? 'light' : 'dark');
}
applyTheme(resolvedTheme());

themeToggle.onclick = () => {
  const next = resolvedTheme() === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
};

mql.addEventListener('change', () => {
  if (!localStorage.getItem(THEME_KEY)) applyTheme(resolvedTheme());
});

connect();
</script>
